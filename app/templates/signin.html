{% extends "base.html" %}
{% block title %}Sign in - {{ event.name }}{% endblock %}
{% block content %}
    <h1>{{ event.name }}</h1>
    <p class="subtitle">{{ event.date.strftime('%d %B %Y') }}</p>

    {% if errors %}
        <ul class="errors">
            {% for error in errors %}
                <li>{{ error }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <form method="POST" novalidate>
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" value="{{ request.form.get('name', '') }}" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ request.form.get('email', '') }}" required>

        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone" value="{{ request.form.get('phone', '') }}" required>

        <button type="submit">Sign in</button>
    </form>
{% endblock %}
